# Production-specific settings for Render
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Mock data generation (Restoring full data)
mock.data.generate.on.startup=true
mock.data.patent.size=1000
mock.data.trademark.size=500

# File Upload Configuration (Render ephemeral FS - use Persistent Disk for long-term)
file.upload-dir=/opt/render/project/src/uploads
spring.web.resources.static-locations=file:/opt/render/project/src/uploads/,classpath:/static/

# Server Port (Render sets PORT env automatically)
server.port=${PORT:8080}

# OAuth2 Configuration Overrides
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-id-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-secret-placeholder}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:github-id-placeholder}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:github-secret-placeholder}

# Mail Configuration Overrides
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

